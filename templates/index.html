<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schematic Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 1rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 24px;
    }

    .upload-zone {
      border: 2px dashed #3b4268;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: #60a5fa;
      background: rgba(96, 165, 250, 0.05);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .upload-zone p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .upload-zone .hint {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 6px;
    }

    #preview-container {
      margin-top: 20px;
      display: none;
    }

    #preview-container img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid #2d3148;
    }

    #preview-name {
      font-size: 0.85rem;
      color: #60a5fa;
      margin-top: 8px;
      text-align: center;
    }

    button#analyze-btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button#analyze-btn:hover { opacity: 0.9; }
    button#analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2d3148;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; }

    .summary-box {
      background: rgba(96, 165, 250, 0.08);
      border: 1px solid rgba(96, 165, 250, 0.2);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.95rem;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-chip {
      background: #2d3148;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: #a78bfa;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: #161824;
      color: #60a5fa;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid #2d3148;
    }

    tbody tr {
      border-bottom: 1px solid #1a1d2e;
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(255,255,255,0.03); }

    tbody td {
      padding: 12px 16px;
      color: #cbd5e1;
    }

    tbody td:first-child {
      font-weight: 500;
      color: #e2e8f0;
    }

    .type-badge {
      display: inline-block;
      background: #1a2035;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: #fca5a5;
      font-size: 0.9rem;
      display: none;
    }

    .reset-btn {
      margin-top: 16px;
      background: none;
      border: 1px solid #3b4268;
      color: #94a3b8;
      border-radius: 8px;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: #60a5fa; color: #60a5fa; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Schematic Analyzer</h1>
    <p>Upload a schematic image — AI will extract all components and values</p>
  </header>

  <div class="card">
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.gif,.webp,.bmp" />
      <div class="upload-icon">🖼️</div>
      <p>Drag & drop your schematic image here</p>
      <p>or <strong style="color:#60a5fa">click to browse</strong></p>
      <p class="hint">PNG, JPG, JPEG, GIF, WEBP · Max 5MB</p>
    </div>

    <div id="preview-container">
      <img id="preview-img" src="" alt="Preview" />
      <div id="preview-name"></div>
    </div>

    <button id="analyze-btn" disabled>Analyze Schematic</button>
  </div>

  <div class="card" id="loading">
    <div class="spinner"></div>
    <p>Analyzing schematic with AI...</p>
  </div>

  <div class="card error-box" id="error-box"></div>

  <div class="card" id="results">
    <div class="summary-box" id="summary-text"></div>
    <div class="stats-row">
      <div class="stat-chip" id="count-chip"></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Label</th>
          <th>Type</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <button class="reset-btn" onclick="reset()">↩ Analyze another schematic</button>
  </div>

  <script>
    const fileInput = document.getElementById("file-input");
    const dropZone = document.getElementById("drop-zone");
    const analyzeBtn = document.getElementById("analyze-btn");
    const previewContainer = document.getElementById("preview-container");
    const previewImg = document.getElementById("preview-img");
    const previewName = document.getElementById("preview-name");
    const loading = document.getElementById("loading");
    const results = document.getElementById("results");
    const errorBox = document.getElementById("error-box");

    let selectedFile = null;

    fileInput.addEventListener("change", (e) => handleFile(e.target.files[0]));

    dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewName.textContent = file.name;
        previewContainer.style.display = "block";
        analyzeBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    analyzeBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      analyzeBtn.disabled = true;
      loading.style.display = "block";
      results.style.display = "none";
      errorBox.style.display = "none";

      const formData = new FormData();
      formData.append("image", selectedFile);

      try {
        const res = await fetch("/analyze", { method: "POST", body: formData });
        const json = await res.json();

        loading.style.display = "none";

        if (!json.success) {
          errorBox.textContent = "Error: " + json.error;
          errorBox.style.display = "block";
          analyzeBtn.disabled = false;
          return;
        }

        const data = json.data;
        document.getElementById("summary-text").textContent = data.summary || "Analysis complete.";
        document.getElementById("count-chip").textContent = `${data.component_count || data.components.length} components found`;

        const tbody = document.getElementById("results-body");
        tbody.innerHTML = "";
        (data.components || []).forEach(c => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${c.label || "—"}</td>
            <td><span class="type-badge">${c.type || "Unknown"}</span></td>
            <td>${c.value || "Not labeled"}</td>
          `;
          tbody.appendChild(tr);
        });

        results.style.display = "block";

      } catch (err) {
        loading.style.display = "none";
        errorBox.textContent = "Network error. Please try again.";
        errorBox.style.display = "block";
        analyzeBtn.disabled = false;
      }
    });

    function reset() {
      selectedFile = null;
      fileInput.value = "";
      previewContainer.style.display = "none";
      results.style.display = "none";
      errorBox.style.display = "none";
      analyzeBtn.disabled = true;
    }
  </script>
</body>
</html>
